<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Puter Client-Side AI Bridge</title>
</head>
<body style="margin: 0; padding: 0; background: transparent; overflow: hidden;">
  <script>
    let hasSent = false;
    
    // Helper function to send message to Streamlit
    function sendToStreamlit(type, payload = {}) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: type,
        ...payload
      }, "*");
    }

    // Initialize immediately - DO NOT wait for any load event!
    // Signal readiness instantly so Streamlit never throws "having trouble loading" error.
    sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
    sendToStreamlit("streamlit:setFrameHeight", { height: 0 });

    // Automated clicker script to auto-dismiss Puter consent overlays if they are injected in the DOM
    function autoClickPuterButtons(root = document) {
      try {
        const buttons = root.querySelectorAll('button');
        for (let btn of buttons) {
          const text = (btn.textContent || btn.innerText || "").toLowerCase();
          if (text.includes('continue') || text.includes('agree') || text.includes('allow')) {
            btn.click();
            console.log("Automatically dismissed Puter dialog button:", text);
          }
        }
        
        // Check for shadow roots
        const allElements = root.querySelectorAll('*');
        for (let el of allElements) {
          if (el.shadowRoot) {
            autoClickPuterButtons(el.shadowRoot);
          }
        }
      } catch (e) {
        // Suppress any cross-origin script execution errors
      }
    }

    // Start scanning for consent buttons periodically
    setInterval(autoClickPuterButtons, 100);

    // Listen for render events from Streamlit
    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === "streamlit:render") {
        const args = event.data.args || {};
        const prompt = args.prompt;
        const model = args.model || "gpt-5.5";
        const puterToken = args.puter_token;
        
        if (prompt && !hasSent) {
          hasSent = true;
          
          if (puterToken) {
            // --- MODE 1: Token-based direct REST fetch (100% Popup-free) ---
            console.log("Puter Bridge: Using token-based REST API bridge.");
            fetch("https://api.puter.com/puterai/openai/v1/chat/completions", {
              method: "POST",
              headers: {
                "Authorization": "Bearer " + puterToken,
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                messages: [{ role: "user", content: prompt }],
                model: model
              })
            })
            .then(function(res) {
              if (!res.ok) {
                throw new Error("HTTP error " + res.status);
              }
              return res.json();
            })
            .then(function(data) {
              let result = "";
              if (data && typeof data === 'object' && data.choices && data.choices.length > 0) {
                const choice = data.choices[0];
                if (choice.message && choice.message.content) {
                  result = choice.message.content;
                } else {
                  result = choice.text || choice.message || "";
                }
              }
              if (!result) {
                result = JSON.stringify(data);
              }
              sendToStreamlit("streamlit:setComponentValue", { value: result.toString() });
            })
            .catch(function(error) {
              sendToStreamlit("streamlit:setComponentValue", { value: "Error from Puter.js: " + error.toString() });
            });
          } else {
            // --- MODE 2: Keyless browser-side Puter.js library (Free, Keyless Frontend) ---
            console.log("Puter Bridge: Using keyless Puter.js frontend library.");
            
            // Dynamically load the Puter.js library script
            const script = document.createElement("script");
            script.src = "https://js.puter.com/v2/";
            script.onload = function() {
              function executePuterSDKChat() {
                if (!window.puter || !window.puter.ai) {
                  setTimeout(executePuterSDKChat, 50);
                  return;
                }
                
                // Call Puter.js AI Chat directly in the frontend
                puter.ai.chat(prompt, { model: model })
                  .then(function(response) {
                    const textResponse = response.text || response.message || response.toString();
                    sendToStreamlit("streamlit:setComponentValue", { value: textResponse });
                  })
                  .catch(function(error) {
                    sendToStreamlit("streamlit:setComponentValue", { value: "Error from Puter.js: " + error.toString() });
                  });
              }
              executePuterSDKChat();
            };
            script.onerror = function() {
              sendToStreamlit("streamlit:setComponentValue", { value: "Error from Puter.js: Failed to load Puter.js library." });
            };
            document.head.appendChild(script);
          }
        }
      }
    });
  </script>
</body>
</html>
