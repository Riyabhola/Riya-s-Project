<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Puter Client-Side AI Bridge</title>
  <!-- Load Puter.js library -->
  <script src="https://js.puter.com/v2/"></script>
</head>
<body style="margin: 0; padding: 0; background: transparent; overflow: hidden;">
  <script>
    let hasSent = false;
    
    // Helper function to send message to Streamlit
    function sendToStreamlit(type, payload = {}) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: type,
        ...payload
      }, "*");
    }

    // Initialize immediately - DO NOT wait for the window load event or jsdelivr!
    // Signal readiness instantly so Streamlit never throws "having trouble loading" error.
    sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
    sendToStreamlit("streamlit:setFrameHeight", { height: 0 });

    // Listen for render events from Streamlit
    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === "streamlit:render") {
        const args = event.data.args || {};
        const prompt = args.prompt;
        const model = args.model || "gpt-4o-mini";
        const puterToken = args.puter_token;
        
        if (puterToken) {
          try {
            localStorage.setItem("puter-auth-token", puterToken);
            localStorage.setItem("puter.auth.token", puterToken);
            localStorage.setItem("puter_auth_token", puterToken);
            localStorage.setItem("auth_token", puterToken);
            
            if (window.puter) {
              if (!puter.auth) puter.auth = {};
              puter.authToken = puterToken;
              puter.auth.token = puterToken;
              puter.auth.authToken = puterToken;
            }
          } catch (e) {
            console.error("Failed to set Puter auth tokens:", e);
          }
        }
        
        if (prompt && !hasSent) {
          hasSent = true;
          
          // Function to execute the Puter AI chat
          function executePuterChat() {
            if (!window.puter || !window.puter.ai) {
              // If Puter.js is not loaded yet, wait and retry
              setTimeout(executePuterChat, 50);
              return;
            }
            
            puter.ai.chat(prompt, { model: model })
              .then(function(response) {
                const textResponse = response.text || response.message || response.toString();
                sendToStreamlit("streamlit:setComponentValue", { value: textResponse });
              })
              .catch(function(error) {
                sendToStreamlit("streamlit:setComponentValue", { value: "Error from Puter.js: " + error.toString() });
              });
          }
          
          executePuterChat();
        }
      }
    });
  </script>
</body>
</html>
