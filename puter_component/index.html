<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Puter Client-Side AI Bridge</title>
</head>
<body style="margin: 0; padding: 0; background: transparent; overflow: hidden;">
  <script>
    let hasSent = false;
    
    // Helper function to send message to Streamlit
    function sendToStreamlit(type, payload = {}) {
      window.parent.postMessage({
        isStreamlitMessage: true,
        type: type,
        ...payload
      }, "*");
    }

    // Initialize immediately - DO NOT wait for any load event!
    // Signal readiness instantly so Streamlit never throws "having trouble loading" error.
    sendToStreamlit("streamlit:componentReady", { apiVersion: 1 });
    sendToStreamlit("streamlit:setFrameHeight", { height: 0 });

    // Listen for render events from Streamlit
    window.addEventListener("message", function(event) {
      if (event.data && event.data.type === "streamlit:render") {
        const args = event.data.args || {};
        const prompt = args.prompt;
        const model = args.model || "gpt-4o-mini";
        const puterToken = args.puter_token;
        
        if (prompt && !hasSent) {
          hasSent = true;
          
          if (!puterToken) {
            sendToStreamlit("streamlit:setComponentValue", { value: "Error from Puter.js: Missing authorization token." });
            return;
          }
          
          // Perform direct CORS fetch to Puter REST API - bypassing js.puter.com login popups completely!
          fetch("https://api.puter.com/v1/ai/chat", {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + puterToken,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              messages: [{ role: "user", content: prompt }],
              model: model,
              stream: false
            })
          })
          .then(function(res) {
            if (!res.ok) {
              throw new Error("HTTP error " + res.status);
            }
            return res.json();
          })
          .then(function(data) {
            let result = "";
            if (data && typeof data === 'object') {
              result = data.text || data.message || "";
              if (!result && data.choices && data.choices.length > 0) {
                const choice = data.choices[0];
                if (choice.message && choice.message.content) {
                  result = choice.message.content;
                } else {
                  result = choice.text || choice.message || "";
                }
              }
            }
            if (!result) {
              result = JSON.stringify(data);
            }
            sendToStreamlit("streamlit:setComponentValue", { value: result.toString() });
          })
          .catch(function(error) {
            sendToStreamlit("streamlit:setComponentValue", { value: "Error from Puter.js: " + error.toString() });
          });
        }
      }
    });
  </script>
</body>
</html>
